<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Prophecy | Collections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; }
        .nav-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { display: none; }
        .product-card img { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-6 md:p-10 nav-blur bg-black/20 border-b border-white/5">
        <a href="index.html" class="text-xl font-bold tracking-[0.3em] uppercase">Silent Prophecy</a>
        <div class="flex items-center space-x-8 text-[10px] uppercase tracking-[0.3em]">
            <a href="collections.html" class="hover:text-gray-400 transition border-b border-white">Collections</a>
            <a href="the-prophecy.html" class="hover:text-gray-400 transition">La Vision</a>
            <a href="contact.html" class="hover:text-gray-400 transition">Contact</a>
            <div id="cart" class="border border-white/20 px-5 py-2">Panier (0)</div>
        </div>
    </nav>

    <main class="pt-40 pb-20">
        <div class="px-6 md:px-10 mb-16">
            <h1 class="text-xs uppercase tracking-[0.8em] text-gray-500 mb-4">Premier drop</h1>
            <h2 class="text-4xl md:text-6xl font-bold tracking-tighter uppercase">Toute la collection</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-1 bg-white/5">
            
            <a href="product.html" class="product-card relative group bg-[#0d0d0d] overflow-hidden">
                <div class="aspect-[3/4] overflow-hidden">
                    <img src="tshirtmertra.jpg" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                </div>
                <div class="p-8 bg-black flex justify-between items-end">
                    <div>
                        <p class="text-[8px] text-gray-500 uppercase tracking-widest font-bold">350GSM</p>
                        <h3 class="text-xs uppercase tracking-widest">Prophecy Tee</h3>
                    </div>
                    <span class="text-xs font-light">65€</span>
                </div>
            </a>

            <a href="product.html" class="product-card relative group bg-[#0d0d0d] overflow-hidden">
                <div class="aspect-[3/4] overflow-hidden">
                    <img src="hautmertra.jpg" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                </div>
                <div class="p-8 bg-black flex justify-between items-end">
                    <div>
                        <p class="text-[8px] text-gray-500 uppercase tracking-widest font-bold">Heavyweight</p>
                        <h3 class="text-xs uppercase tracking-widest">Signature Hoodie</h3>
                    </div>
                    <span class="text-xs font-light">120€</span>
                </div>
            </a>

            <a href="product.html" class="product-card relative group bg-[#0d0d0d] overflow-hidden">
                <div class="aspect-[3/4] overflow-hidden">
                    <img src="basmertra.jpg" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                </div>
                <div class="p-8 bg-black flex justify-between items-end">
                    <div>
                        <p class="text-[8px] text-gray-500 uppercase tracking-widest font-bold">Limited</p>
                        <h3 class="text-xs uppercase tracking-widest">Cargo Pant V1</h3>
                    </div>
                    <span class="text-xs font-light">145€</span>
                </div>
            </a>

            <div class="product-card relative group bg-[#0d0d0d] overflow-hidden opacity-50">
                <div class="aspect-[3/4] bg-[#1a1a1a] flex items-center justify-center">
                    <span class="text-[10px] uppercase tracking-[0.5em] text-gray-600">Sold Out</span>
                </div>
                <div class="p-8 bg-black flex justify-between items-end">
                    <h3 class="text-xs uppercase tracking-widest">Coming Soon</h3>
                    <span class="text-xs font-light">--€</span>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-20 px-10 border-t border-white/5 text-center">
        <p class="text-[8px] text-gray-700 tracking-[1em]">© 2026 SILENT PROPHECY</p>
    </footer>

</body>
</html>
