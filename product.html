<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Prophecy | Produit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .nav-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-6 md:p-10 nav-blur bg-black/20 border-b border-white/5">
        <a href="index.html" class="text-xl font-bold tracking-[0.3em] uppercase">Silent Prophecy</a>
        <div class="flex items-center space-x-8 text-[10px] uppercase tracking-[0.3em]">
            <a href="collections.html" class="hover:text-gray-400 transition">Collections</a>
            <a href="the-prophecy.html" class="hover:text-gray-400 transition">La Vision</a>
            <a href="contact.html" class="hover:text-gray-400 transition">Contact</a>
            <div id="cart" class="cursor-pointer border border-white/20 px-5 py-2 hover:bg-white hover:text-black transition">Panier (0)</div>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6 max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12 gap-12">
        <div class="md:col-span-8 space-y-4">
            <img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=2000" class="w-full grayscale">
        </div>
        <div class="md:col-span-4 sticky top-40 h-fit space-y-10">
            <h1 class="text-4xl font-bold uppercase tracking-tighter">T-Shirt "Prophecy"</h1>
            <p class="text-2xl font-light">65.00€</p>
            <div class="text-sm text-gray-400 space-y-4 italic"><p>350g/m² Organic Cotton. Oversized fit.</p></div>
            <div class="grid grid-cols-4 gap-2">
                <button class="border border-white/20 py-3 hover:border-white transition">S</button>
                <button class="border border-white/20 py-3 hover:border-white transition">M</button>
                <button class="border border-white/20 py-3 hover:border-white transition">L</button>
                <button class="border border-white/20 py-3 hover:border-white transition">XL</button>
            </div>
            <button onclick="alert('Ajouté')" class="w-full bg-white text-black py-5 uppercase font-bold tracking-widest text-xs">Ajouter au panier</button>
        </div>
    </main>
</body>
</html>
